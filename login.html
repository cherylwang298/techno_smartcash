<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smartcash - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="w-[360px] h-[720px] bg-white rounded-[40px] shadow-2xl border border-gray-200 flex flex-col items-center p-6 relative overflow-hidden">

        <div class="flex flex-row gap-3 items-center mt-10">
            <div class="w-16 h-16 bg-blue-600 rounded-xl mb-3 flex items-center justify-center text-white font-bold text-2xl">S</div>
            <h2 class="text-2xl font-semibold tracking-wide">SMARTCASH</h2>
        </div>

        <form action="proses_login.php" method="POST" class="w-full mt-10 space-y-4 bg-blue-50 shadow-lg rounded-2xl p-8">
            
            <div>
                <input 
                    type="tel"
                    name="phone"
                    placeholder="Nomor Telepon"
                    required
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
                />
            </div>

            <div>
                <input 
                    type="password"
                    name="password"
                    placeholder="Password"
                    required
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
                />
            </div>

            <button type="submit" name="login" class="w-full bg-black text-white py-3 rounded-xl font-semibold hover:bg-gray-800 transition active:scale-95">
                LOGIN
            </button>

        </form>

        <p class="text-sm mt-8 text-gray-600">
            Belum punya akun? 
            <a href="register.html" class="font-semibold text-blue-600 hover:underline">daftar sekarang</a>
        </p>

    </div>

</body>
</html>
